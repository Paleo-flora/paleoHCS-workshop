<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paleoHCS Workshop | The last 23 Ma of the HCS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; scroll-behavior: smooth; }
        .hero-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-4px); }
        .schedule-tag {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .day-tab {
            cursor: pointer;
            padding: 1rem 2rem;
            font-weight: 600;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        .day-tab.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
            background: #eff6ff;
        }
        #export-container {
            padding: 40px;
            background: white;
            width: 1280px;
        }
        .export-time-col {
            width: 80px;
            flex-shrink: 0;
            font-family: monospace;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="font-bold text-xl text-blue-800 tracking-tight">paleoHCS</span>
            <div class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="#about" class="hover:text-blue-600 transition">About</a>
                <a href="#speakers" class="hover:text-blue-600 transition">Speakers</a>
                <a href="#schedule" class="hover:text-blue-600 transition">Schedule</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <header class="hero-gradient text-white py-24 px-4 text-center">
        <div class="max-w-4xl mx-auto">
            <div class="inline-block px-4 py-1.5 mb-6 text-sm font-semibold tracking-wide uppercase bg-blue-500/20 text-blue-300 rounded-full border border-blue-500/30">
                Workshop Announcement
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold mb-8 tracking-tight leading-tight">
                The last 23 Ma of the HCS: <br>
                <span class="text-blue-400 font-light italic text-3xl md:text-5xl">oceanographic, climatic and ecological features</span>
            </h1>
            
            <div class="flex flex-wrap justify-center gap-4">
                <a href="#schedule" class="bg-white text-slate-900 px-8 py-3 rounded-full font-semibold hover:bg-slate-100 transition shadow-lg border border-transparent">View Schedule</a>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-20 space-y-32">
        <!-- Schedule Section -->
        <section id="schedule" class="max-w-5xl mx-auto">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-8 gap-4">
                <div class="text-center md:text-left">
                    <h2 class="text-3xl font-bold text-slate-900">Workshop Agenda</h2>
                    <p class="text-slate-500 italic">Updated based on the latest planning</p>
                </div>
                <div class="flex flex-wrap gap-3 justify-center">
                    <button onclick="downloadExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg font-semibold flex items-center justify-center gap-2 shadow-sm transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                        Export Excel
                    </button>
                    <button onclick="downloadAgendaChart()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold flex items-center justify-center gap-2 shadow-sm transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                        Download Image
                    </button>
                </div>
            </div>
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="flex border-b border-slate-200 bg-slate-50">
                    <div onclick="showDay(1)" id="tab-1" class="day-tab active flex-1 text-center">Day 1</div>
                    <div onclick="showDay(2)" id="tab-2" class="day-tab flex-1 text-center">Day 2</div>
                    <div onclick="showDay(3)" id="tab-3" class="day-tab flex-1 text-center">Day 3</div>
                </div>

                <div id="day-content" class="divide-y divide-slate-100"></div>
            </div>
        </section>
    </main>

    <div id="export-wrapper" style="position: absolute; left: -9999px;">
        <div id="export-container">
            <h1 class="text-3xl font-bold text-blue-900 mb-6">paleoHCS Workshop Agenda 2026</h1>
            <div id="export-grid" class="grid grid-cols-3 gap-6"></div>
        </div>
    </div>

    <script>
        const agendaData = {
            1: {
                title: "Day 1: Oceanographic Evolution",
                rows: [
                    { time: "09:00 AM", event: "Welcome & Housekeeping", type: "Intro", color: "bg-slate-50" },
                    { time: "09:15 AM", event: "Keynote: Frank Lamy", type: "Keynote", color: "bg-orange-50" },
                    { time: "09:55 AM", event: "Q&A Session Keynote", type: "Q&A", color: "bg-orange-50/50" },
                    { time: "10:05 AM", event: "Morning Talk Block (3)", type: "Talks", color: "" },
                    { time: "11:05 AM", event: "Coffee Break", type: "Break", color: "bg-slate-50" },
                    { time: "11:25 AM", event: "Debate I: Record Gaps", type: "Debate", color: "bg-blue-50" },
                    { time: "12:30 PM", event: "Lunch Break", type: "Break", color: "bg-slate-50" },
                    { time: "01:50 PM", event: "Keynote: Pierre Sepulchre", type: "Keynote", color: "bg-orange-50" },
                    { time: "02:30 PM", event: "Q&A Session Keynote", type: "Q&A", color: "bg-orange-50/50" },
                    { time: "02:40 PM", event: "Afternoon Talk Block A (3)", type: "Talks", color: "" },
                    { time: "03:40 PM", event: "Short Break", type: "Break", color: "bg-slate-50" },
                    { time: "04:00 PM", event: "Afternoon Talk Block B (2)", type: "Talks", color: "" },
                    { time: "04:40 PM", event: "Debate II: Proxy-Model", type: "Debate", color: "bg-blue-50" },
                    { time: "05:30 PM", event: "Daily Wrap-up", type: "Closing", color: "bg-slate-100" }
                ]
            },
            2: {
                title: "Day 2: Ecological Integration",
                rows: [
                    { time: "09:00 AM", event: "Morning Briefing", type: "Intro", color: "bg-slate-50" },
                    { time: "09:15 AM", event: "Keynote: Elisa Malinverno", type: "Keynote", color: "bg-orange-50" },
                    { time: "09:55 AM", event: "Q&A Session Keynote", type: "Q&A", color: "bg-orange-50/50" },
                    { time: "10:05 AM", event: "Morning Talk Block (3)", type: "Talks", color: "" },
                    { time: "11:05 AM", event: "Coffee Break", type: "Break", color: "bg-slate-50" },
                    { time: "11:25 AM", event: "Debate III: Big Data", type: "Debate", color: "bg-blue-50" },
                    { time: "12:30 PM", event: "Lunch Break", type: "Break", color: "bg-slate-50" },
                    { time: "01:50 PM", event: "Afternoon Talk Block (5)", type: "Talks", color: "" },
                    { time: "03:30 PM", event: "Group Photo Session", type: "Event", color: "bg-emerald-50" },
                    { time: "03:40 PM", event: "Short Break", type: "Break", color: "bg-slate-50" },
                    { time: "04:05 PM", event: "Debate IV: Climate Response", type: "Debate", color: "bg-blue-50" },
                    { time: "05:00 PM", event: "Daily Wrap-up", type: "Closing", color: "bg-slate-100" },
                    { time: "05:30 PM", event: "Social Gathering", type: "Social", color: "bg-slate-800 text-white" }
                ]
            },
            3: {
                title: "Day 3: Future & Synthesis",
                rows: [
                    { time: "09:00 AM", event: "Morning Briefing", type: "Intro", color: "bg-slate-50" },
                    { time: "09:15 AM", event: "Keynote: 4th Speaker (TBD)", type: "Keynote", color: "bg-orange-50" },
                    { time: "09:55 AM", event: "Q&A Session Keynote", type: "Q&A", color: "bg-orange-50/50" },
                    { time: "10:05 AM", event: "Morning Talk Block (3)", type: "Talks", color: "" },
                    { time: "11:05 AM", event: "Coffee Break", type: "Break", color: "bg-slate-50" },
                    { time: "11:25 AM", event: "Debate V: Joint Funding", type: "Debate", color: "bg-blue-50" },
                    { time: "12:30 PM", event: "Lunch Break", type: "Break", color: "bg-slate-50" },
                    { time: "01:50 PM", event: "Afternoon Talk Block (5)", type: "Talks", color: "" },
                    { time: "03:40 PM", event: "Short Break", type: "Break", color: "bg-slate-50" },
                    { time: "03:50 PM", event: "Debate VI: Strategy", type: "Debate", color: "bg-blue-50" },
                    { time: "05:00 PM", event: "Daily Wrap-up", type: "Closing", color: "bg-slate-100" },
                    { time: "05:30 PM", event: "Conclusions & Closing Event", type: "Closing", color: "bg-slate-900 text-white" }
                ]
            }
        };

        function showDay(dayNum) {
            document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${dayNum}`).classList.add('active');
            const content = document.getElementById('day-content');
            const data = agendaData[dayNum];
            let html = `<div class="bg-blue-50 px-6 py-3 font-bold text-blue-800 text-sm">${data.title.toUpperCase()}</div>`;
            data.rows.forEach(row => {
                html += `
                    <div class="px-6 py-4 flex flex-col md:flex-row md:items-center justify-between gap-2 ${row.color}">
                        <span class="font-semibold w-24 text-sm">${row.time}</span>
                        <div class="flex-grow font-bold text-slate-800">${row.event}</div>
                        <span class="schedule-tag">${row.type}</span>
                    </div>
                `;
            });
            content.innerHTML = html;
        }

        function downloadExcel() {
            const wb = XLSX.utils.book_new();
            [1, 2, 3].forEach(day => {
                const data = agendaData[day];
                const wsData = [
                    [data.title],
                    ["Time", "Event", "Type"],
                    ...data.rows.map(r => [r.time, r.event, r.type])
                ];
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                ws['!cols'] = [{ wch: 15 }, { wch: 45 }, { wch: 15 }];
                XLSX.utils.book_append_sheet(wb, ws, `Day ${day}`);
            });
            XLSX.writeFile(wb, "paleoHCS_Workshop_Agenda.xlsx");
        }

        async function downloadAgendaChart() {
            const grid = document.getElementById('export-grid');
            grid.innerHTML = '';
            [1, 2, 3].forEach(day => {
                const dayData = agendaData[day];
                let dayHtml = `
                    <div class="border rounded-lg overflow-hidden bg-white">
                        <div class="bg-blue-900 text-white px-3 py-2 font-bold text-sm">${dayData.title}</div>
                        <div class="text-[10px] divide-y">
                `;
                dayData.rows.forEach(row => {
                    dayHtml += `
                        <div class="px-2 py-1.5 flex items-center gap-2 ${row.color || ''}">
                            <span class="w-16 flex-shrink-0 font-bold">${row.time}</span>
                            <span class="flex-grow font-medium text-slate-700">${row.event}</span>
                        </div>
                    `;
                });
                dayHtml += `</div></div>`;
                grid.innerHTML += dayHtml;
            });

            html2canvas(document.getElementById('export-container'), { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'paleoHCS_Agenda_Update.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
            });
        }

        window.onload = () => showDay(1);
    </script>
</body>
</html>
